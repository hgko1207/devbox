<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="브라우저에서만 동작하는 개발자용 웹 도구 모음. 데이터는 서버로 전송되지 않습니다." />
    <meta name="color-scheme" content="light dark" />
    <title>devbox — 개발자 도구 모음</title>
    <script>
      // 화면 깜빡임(FOUC) 방지: 페인트 전에 저장된 테마를 즉시 적용
      (function () {
        try {
          var stored = localStorage.getItem('devbox-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || ((stored === 'system' || !stored) && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
